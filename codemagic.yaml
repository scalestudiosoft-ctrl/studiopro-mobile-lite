workflows:
  android-apk:
    name: Studio Pro Android APK
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: |
          flutter pub get
      - name: Generate Android platform if missing
        script: |
          if [ ! -f android/app/build.gradle ] && [ ! -f android/app/build.gradle.kts ]; then
            flutter create . --platforms=android
          fi
      - name: Generate launcher icon
        script: |
          dart run flutter_launcher_icons
      - name: Build debug APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
